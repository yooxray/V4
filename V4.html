<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leather Stock Journal | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        .journal-input { border: none; border-bottom: 1px solid #e5e7eb; padding: 0.5rem 0; width: 100%; transition: border-color 0.2s; outline: none; background: transparent; }
        .journal-input:focus { border-bottom-color: #000; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .status-select { appearance: none; cursor: pointer; padding: 0.4rem 1.2rem; border-radius: 9999px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; border: none; outline: none; }
        .compare-card { border-top: 4px solid #4f46e5; background: #f9fafb; transition: transform 0.2s; }
        .compare-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="antialiased">

    <!-- Navigation -->
    <nav class="sticky top-0 bg-white/90 backdrop-blur-md border-b border-gray-100 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tighter uppercase">Leather Journal</h1>
            <div class="flex gap-8 text-xs font-black uppercase tracking-widest">
                <button onclick="showView('journal')" id="nav-journal" class="text-black border-b-2 border-black pb-1">Logbook</button>
                <button onclick="showView('dashboard')" id="nav-dashboard" class="text-gray-400 hover:text-black pb-1">Dashboard</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        
        <!-- Summary Dashboard (Always visible) -->
        <div id="summary-cards" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-20">
            <div class="p-10 border border-gray-100 rounded-3xl bg-gray-50/50">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2">Total Batches</p>
                <h2 id="sum-docs" class="text-4xl font-light tracking-tighter">0</h2>
            </div>
            <div class="p-10 border border-gray-100 rounded-3xl bg-gray-50/50">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2">Total Stock Units</p>
                <h2 id="sum-qty" class="text-4xl font-light tracking-tighter text-indigo-600">0</h2>
            </div>
            <div class="p-10 border border-gray-100 rounded-3xl bg-gray-50/50">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2">Last Journal Update</p>
                <h2 id="sum-updated" class="text-sm font-semibold mt-3 text-gray-800">No entries yet</h2>
            </div>
        </div>

        <!-- VIEW: LOGBOOK -->
        <div id="view-journal" class="space-y-12">
            <div class="flex justify-between items-end border-b border-gray-100 pb-8">
                <div>
                    <h2 class="text-4xl font-extrabold tracking-tight">Entries</h2>
                    <p class="text-gray-400 font-light mt-1">Journal of stock by document and project.</p>
                </div>
                <button onclick="openEntryForm()" class="bg-black text-white px-8 py-4 rounded-full text-xs font-black uppercase tracking-widest hover:bg-gray-800 transition-all shadow-xl">
                    + New Batch Entry
                </button>
            </div>
            <div id="journal-list" class="space-y-24"></div>
        </div>

        <!-- VIEW: DASHBOARD -->
        <div id="view-dashboard" class="hidden space-y-24">
            
            <!-- SECTION: MONTHLY ANALYTICS -->
            <section class="space-y-12">
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 border-b border-gray-100 pb-8">
                    <div>
                        <h2 class="text-3xl font-extrabold tracking-tight">Category Breakdown</h2>
                        <p class="text-gray-400 font-light mt-1">Filtered inventory totals by period.</p>
                    </div>
                    <div class="flex items-center gap-4 bg-gray-50 p-2 rounded-2xl">
                        <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Period View:</label>
                        <select id="dash-filter" onchange="renderDashboard()" class="bg-white border border-gray-200 rounded-xl px-4 py-2 text-xs font-black uppercase tracking-widest outline-none cursor-pointer">
                            <option value="all">All Time</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-16" id="dashboard-grids">
                    <!-- Tables injected here -->
                </div>
            </section>

            <!-- SECTION: COMPARISON BOARD -->
            <section class="pt-20 border-t border-gray-100">
                <div class="flex justify-between items-end mb-12">
                    <div>
                        <h2 class="text-3xl font-extrabold tracking-tight text-indigo-900">Analysis Board</h2>
                        <p class="text-gray-400 font-light mt-1">Compare stock levels across multiple months.</p>
                    </div>
                    <button onclick="addComparisonPeriod()" class="text-[10px] font-black uppercase tracking-widest text-indigo-600 bg-indigo-50 px-6 py-3 rounded-full hover:bg-indigo-100 transition-all">
                        + Add Period to Board
                    </button>
                </div>
                <div id="comparison-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Comparison cards injected here -->
                </div>
            </section>
        </div>
    </main>

    <!-- FORM MODAL -->
    <div id="entry-modal" class="fixed inset-0 bg-white z-[100] hidden overflow-y-auto">
        <div class="max-w-4xl mx-auto px-6 py-20">
            <div class="flex justify-between items-center mb-20 border-b border-gray-100 pb-6">
                <h2 class="text-xs font-black uppercase tracking-[0.4em] text-gray-400">Journal Batch Registration</h2>
                <button onclick="closeModal()" class="text-xs font-black uppercase tracking-widest hover:text-red-500">Close Form</button>
            </div>
            <form id="journal-form" onsubmit="saveEntry(event)">
                <input type="hidden" id="edit-id">
                
                <!-- HEADER GROUP -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-10 mb-24">
                    <div><label class="text-[10px] font-black uppercase text-gray-400 block mb-2">Date</label><input type="date" id="form-date" required class="journal-input font-bold"></div>
                    <div><label class="text-[10px] font-black uppercase text-gray-400 block mb-2">Doc #</label><input type="text" id="form-doc" required placeholder="INV-2023" class="journal-input font-bold"></div>
                    <div><label class="text-[10px] font-black uppercase text-gray-400 block mb-2">Project</label><input type="text" id="form-project" required placeholder="Project Name" class="journal-input font-bold"></div>
                    <div><label class="text-[10px] font-black uppercase text-gray-400 block mb-2">Customer</label><input type="text" id="form-customer" required placeholder="Customer Name" class="journal-input font-bold"></div>
                </div>

                <div id="form-products-container" class="space-y-20"></div>

                <div class="mt-16 flex flex-col gap-6">
                    <button type="button" onclick="addProductRow()" class="w-full py-6 border-2 border-dashed border-gray-100 rounded-3xl text-gray-400 text-xs font-bold uppercase tracking-widest hover:border-indigo-200 hover:text-indigo-600 transition-all">
                        + Add Another Product to this Document
                    </button>
                    
                    <div class="flex items-center gap-6 mt-12 pt-12 border-t border-gray-100">
                        <select id="form-status" class="journal-input flex-1 font-bold"><option value="Pending">Status: Pending</option><option value="Completed">Status: Completed</option></select>
                        <button type="submit" class="flex-[2] bg-indigo-600 text-white py-6 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-700 shadow-2xl transition-all">
                            Save Journal Entry
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('leather_journal_v3')) || [];
        let lastUpdated = localStorage.getItem('leather_updated_v3') || null;
        let comparisonPeriods = [];

        function showView(view) {
            document.getElementById('view-journal').classList.toggle('hidden', view !== 'journal');
            document.getElementById('view-dashboard').classList.toggle('hidden', view !== 'dashboard');
            document.getElementById('nav-journal').className = view === 'journal' ? 'text-black border-b-2 border-black pb-1' : 'text-gray-400 hover:text-black pb-1';
            document.getElementById('nav-dashboard').className = view === 'dashboard' ? 'text-black border-b-2 border-black pb-1' : 'text-gray-400 hover:text-black pb-1';
            if(view === 'dashboard') {
                updateFilterDropdown();
                renderDashboard();
                renderComparisonBoard();
            } else { renderJournal(); }
            updateSummary();
        }

        // --- CORE LOGIC ---
        function saveEntry(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const productRows = document.querySelectorAll('.product-row');
            
            const products = Array.from(productRows).map(row => {
                const item = {};
                row.querySelectorAll('input').forEach(input => { item[input.dataset.key] = input.value; });
                return item;
            });

            const entryData = {
                id: id || Date.now(),
                date: document.getElementById('form-date').value,
                docNum: document.getElementById('form-doc').value,
                project: document.getElementById('form-project').value,
                customer: document.getElementById('form-customer').value,
                status: document.getElementById('form-status').value,
                products: products
            };

            if (id) {
                const idx = db.findIndex(e => e.id == id);
                db[idx] = entryData;
            } else { db.unshift(entryData); }

            saveToStorage();
            closeModal();
            showView('journal');
        }

        function saveToStorage() {
            lastUpdated = new Date().toLocaleString();
            localStorage.setItem('leather_journal_v3', JSON.stringify(db));
            localStorage.setItem('leather_updated_v3', lastUpdated);
        }

        function updateSummary() {
            let totalQty = 0;
            db.forEach(entry => entry.products.forEach(p => totalQty += Number(p.qty || 0)));
            document.getElementById('sum-docs').innerText = db.length;
            document.getElementById('sum-qty').innerText = totalQty.toLocaleString();
            document.getElementById('sum-updated').innerText = lastUpdated || 'No entries yet';
        }

        // --- DASHBOARD ANALYTICS ---
        function updateFilterDropdown() {
            const select = document.getElementById('dash-filter');
            const dates = db.map(e => e.date.substring(0, 7));
            const periods = [...new Set(dates)].sort().reverse();
            const current = select.value;
            select.innerHTML = '<option value="all">All Time Summary</option>';
            periods.forEach(p => select.innerHTML += `<option value="${p}">${formatMonth(p)}</option>`);
            select.value = current;
        }

        function formatMonth(yyyy_mm) {
            if(!yyyy_mm) return "Unknown";
            const [y, m] = yyy_mm.split('-');
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return `${months[parseInt(m)-1]} ${y}`;
        }

        function renderDashboard() {
            const period = document.getElementById('dash-filter').value;
            const filtered = period === 'all' ? db : db.filter(e => e.date.substring(0, 7) === period);
            const stats = { type: {}, pattern: {}, color: {}, gloss: {}, thick: {}, size: {} };
            const names = { type: 'Leather Type', pattern: 'Pattern', color: 'Color', gloss: 'Glossiness', thick: 'Thickness', size: 'Size' };

            filtered.forEach(entry => entry.products.forEach(p => {
                const q = Number(p.qty || 0);
                Object.keys(stats).forEach(key => {
                    const val = p[key] || 'Unlabeled';
                    stats[key][val] = (stats[key][val] || 0) + q;
                });
            }));

            document.getElementById('dashboard-grids').innerHTML = Object.entries(stats).map(([key, data]) => `
                <div class="space-y-6">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-500 border-b border-gray-50 pb-3">${names[key]} Total Quantity</h3>
                    <table class="w-full text-sm">
                        ${Object.entries(data).sort((a,b) => b[1]-a[1]).map(([label, qty]) => `
                            <tr>
                                <td class="py-3 text-gray-500 font-medium border-b border-gray-50">${label}</td>
                                <td class="py-3 text-right font-bold text-gray-900 border-b border-gray-50">${qty.toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </table>
                </div>
            `).join('');
        }

        // --- COMPARISON BOARD ---
        function addComparisonPeriod() {
            const dates = [...new Set(db.map(e => e.date.substring(0, 7)))].sort().reverse();
            if(dates.length === 0) return alert("Enter data first.");
            comparisonPeriods.push(dates[0]);
            renderComparisonBoard();
        }

        function renderComparisonBoard() {
            const container = document.getElementById('comparison-container');
            if(comparisonPeriods.length === 0) {
                container.innerHTML = `<div class="col-span-full py-12 text-center text-gray-300 font-light italic">Analysis board empty. Add periods to compare trends.</div>`;
                return;
            }
            const dates = [...new Set(db.map(e => e.date.substring(0, 7)))].sort().reverse();

            container.innerHTML = comparisonPeriods.map((selected, idx) => {
                const filtered = db.filter(e => e.date.substring(0, 7) === selected);
                const qty = filtered.reduce((acc, e) => acc + e.products.reduce((pa, p) => pa + Number(p.qty || 0), 0), 0);
                return `
                    <div class="compare-card rounded-3xl p-10 shadow-sm animate-in fade-in zoom-in duration-300">
                        <div class="flex justify-between items-center mb-10">
                            <select onchange="comparisonPeriods[${idx}]=this.value; renderComparisonBoard();" class="bg-indigo-600 text-white text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full outline-none">
                                ${dates.map(d => `<option value="${d}" ${d === selected ? 'selected' : ''}>${formatMonth(d)}</option>`).join('')}
                            </select>
                            <button onclick="comparisonPeriods.splice(${idx}, 1); renderComparisonBoard();" class="text-gray-300 hover:text-red-500 text-xs font-bold">✕</button>
                        </div>
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Total Units Added</p>
                        <h4 class="text-5xl font-extralight tracking-tighter text-indigo-900">${qty.toLocaleString()}</h4>
                        <div class="mt-8 pt-8 border-t border-gray-100 flex gap-10">
                            <div><p class="text-[9px] font-black text-gray-300 uppercase mb-1">Batches</p><p class="text-sm font-bold text-gray-700">${filtered.length}</p></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- UI RENDER LOGBOOK ---
        function renderJournal() {
            const list = document.getElementById('journal-list');
            if (db.length === 0) { list.innerHTML = `<div class="text-center py-20 text-gray-400 italic">No entries in the logbook yet.</div>`; return; }
            list.innerHTML = db.map(entry => `
                <div class="group border-l-2 border-gray-100 pl-10 relative">
                    <div class="absolute -left-[5px] top-0 w-2 h-2 rounded-full bg-indigo-200"></div>
                    <div class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div>
                            <span class="text-sm font-black text-indigo-600 tracking-tighter">${entry.date}</span>
                            <div class="flex items-center gap-4 mt-2">
                                <h3 class="text-3xl font-extrabold tracking-tight">${entry.project}</h3>
                                <span class="text-gray-300 font-light text-2xl">/</span>
                                <span class="text-xl font-medium text-gray-500">${entry.docNum}</span>
                            </div>
                            <p class="text-gray-400 text-sm font-light mt-1 uppercase tracking-widest font-bold">Client: ${entry.customer}</p>
                        </div>
                        <div class="flex items-center gap-6">
                             <select onchange="quickStatus('${entry.id}', this.value)" class="status-select ${entry.status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                                <option value="Pending" ${entry.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Completed" ${entry.status === 'Completed' ? 'selected' : ''}>Completed</option>
                            </select>
                            <div class="flex gap-4">
                                <button onclick="openEntryForm('${entry.id}')" class="text-[10px] font-black uppercase text-gray-300 hover:text-black">Edit</button>
                                <button onclick="deleteEntry('${entry.id}')" class="text-[10px] font-black uppercase text-gray-300 hover:text-red-500">Delete</button>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-12">
                        ${entry.products.map((p, idx) => `
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-12 pb-10 ${idx !== entry.products.length-1 ? 'border-b border-gray-50' : ''}">
                                <div><p class="text-[9px] font-black text-gray-300 uppercase mb-2">Leather classification</p><p class="text-sm font-bold text-gray-900">${p.type}</p><p class="text-xs text-gray-500 mt-1">${p.color} • ${p.gloss}</p></div>
                                <div><p class="text-[9px] font-black text-gray-300 uppercase mb-2">Specs</p><p class="text-sm font-medium text-gray-700">${p.pattern || 'Standard'}</p><p class="text-[11px] text-gray-400 mt-1">${p.thick}mm / ${p.size}cm</p></div>
                                <div><p class="text-[9px] font-black text-gray-300 uppercase mb-2">Log quantity</p><p class="text-2xl font-light text-gray-900">${p.qty || 0}</p></div>
                                <div><p class="text-[9px] font-black text-gray-300 uppercase mb-2">Internal note</p><p class="text-xs text-gray-400 italic font-light leading-relaxed">${p.note || 'No notes added.'}</p></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // --- FORM HELPERS ---
        function openEntryForm(id = null) {
            const container = document.getElementById('form-products-container');
            document.getElementById('journal-form').reset();
            container.innerHTML = '';
            document.getElementById('edit-id').value = id || '';
            if (id) {
                const e = db.find(x => x.id == id);
                document.getElementById('form-date').value = e.date;
                document.getElementById('form-doc').value = e.docNum;
                document.getElementById('form-project').value = e.project;
                document.getElementById('form-customer').value = e.customer;
                document.getElementById('form-status').value = e.status;
                e.products.forEach(p => addProductRow(p));
            } else { addProductRow(); }
            document.getElementById('entry-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('entry-modal').classList.add('hidden'); }

        function addProductRow(d = {}) {
            const rid = Date.now() + Math.random();
            document.getElementById('form-products-container').insertAdjacentHTML('beforeend', `
                <div class="product-row animate-in slide-in-from-top-4" id="row-${rid}">
                    <div class="flex justify-between items-center mb-8"><span class="text-[10px] font-black uppercase text-indigo-400 tracking-widest">Product Details</span><button type="button" onclick="document.getElementById('row-${rid}').remove()" class="text-xs text-red-300 hover:text-red-500 font-bold tracking-tighter uppercase">Remove Item</button></div>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-y-10 gap-x-12">
                        ${inp('Type', 'type', d.type)} ${inp('Pattern', 'pattern', d.pattern)} ${inp('Color', 'color', d.color)} ${inp('Glossiness', 'gloss', d.gloss)}
                        ${inp('Thickness (mm)', 'thick', d.thick)} ${inp('Size (cm)', 'size', d.size)} ${inp('Quantity', 'qty', d.qty, 'number')} ${inp('Note', 'note', d.note)}
                    </div>
                </div>
            `);
        }

        function inp(l, k, v = '', t = 'text') {
            return `<div><label class="text-[9px] font-black uppercase text-gray-300 block mb-1">${l}</label><input type="${t}" data-key="${k}" value="${v}" class="journal-input text-sm"></div>`;
        }

        function quickStatus(id, s) { const i = db.findIndex(x => x.id == id); db[i].status = s; saveToStorage(); renderJournal(); }
        function deleteEntry(id) { if(confirm('Delete journal entry?')) { db = db.filter(x => x.id != id); saveToStorage(); showView('journal'); } }

        showView('journal');
    </script>
</body>
</html>
